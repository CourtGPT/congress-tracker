name: Update Congress Tracker

on:
  workflow_dispatch:
    inputs:
      congress:
        description: 'Congress number to synchronize'
        required: false
        default: '119'
      sync_mode:
        description: 'Hourly incremental sync or full bootstrap'
        required: false
        default: 'hourly'
        type: choice
        options:
          - hourly
          - full
      lookback_hours:
        description: 'Incremental overlap window in hours'
        required: false
        default: '6'
      resources:
        description: 'Comma-separated resources to sync; blank means all configured collections'
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: congress-tracker-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
      CONGRESS: ${{ inputs.congress || '119' }}
      CONGRESS_SYNC_MODE: ${{ inputs.sync_mode || 'hourly' }}
      CONGRESS_LOOKBACK_HOURS: ${{ inputs.lookback_hours || '6' }}
      CONGRESS_RESOURCES: ${{ inputs.resources }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch and validate Congress.gov data
        run: npm run update

      - name: Validate generated data shape
        run: npm run validate

      - name: Run API-client fixture tests
        run: npm test

      - name: Detect generated changes
        id: changes
        shell: bash
        run: |
          if git status --porcelain -- data | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update the generated-data pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/congress-tracker-update
          delete-branch: true
          commit-message: 'chore(data): update Congress.gov records'
          title: 'chore(data): update Congress.gov records'
          body: |
            This pull request was generated from Congress.gov.

            The workflow fetched paginated API data, normalized it deterministically, ran fixture tests, and detected a real data diff.

            Review the generated records and `data/metadata.json` before merging.
          labels: automated-update,data
